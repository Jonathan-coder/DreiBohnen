<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Konto - Drei Bohnen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-5" id="accountPage">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h1 class="mb-4">Mein Konto</h1>
                <div class="card mb-4">
                    <div class="card-body">
                        <h2 class="h5">Persönliche Daten</h2>
                        <p><strong>Name:</strong> <span id="accountName"></span></p>
                        <p><strong>E-Mail:</strong> <span id="accountEmail"></span></p>
                        <p><strong>Adresse:</strong> <span id="accountAddress"></span></p>
                        <p><strong>Zahlung:</strong> <span id="accountPayment"></span></p>
                    </div>
                </div>
                <button id="logoutButtonAccount" class="btn btn-outline-dark">Ausloggen</button>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
