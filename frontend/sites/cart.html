<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warenkorb - Drei Bohnen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div id="header-placeholder"></div>

    <main class="container my-5">
        <h1 class="mb-4"><i class="fas fa-shopping-cart"></i> Ihr Warenkorb</h1>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card shadow-sm p-3 bg-white" style="border-radius: var(--border-radius, 8px);">
                    <div id="cart-container">
                        <div class="text-center py-5">
                            <div class="spinner-border text-dark" role="status">
                                <span class="visually-hidden">Lade Warenkorb...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm bg-white" style="border-radius: var(--border-radius, 8px);">
                    <div class="card-body">
                        <h3 class="h5 card-title mb-4">Zusammenfassung</h3>

                        <div class="d-flex justify-content-between align-items-center mb-3 fs-5">
                            <span class="fw-semibold">Gesamtsumme:</span>
                            <span id="cart-total" class="fw-bold text-dark">0.00 €</span>
                        </div>

                        <hr>

                        <a href="checkout.html" class="btn btn-dark w-100 btn-lg mb-2 py-3 fw-bold" id="checkout-btn">
                            Zur Kasse gehen
                        </a>
                        <a href="products.html" class="btn btn-outline-secondary w-100 py-2">
                            <i class="fas fa-arrow-left me-2"></i>Weiter einkaufen
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
