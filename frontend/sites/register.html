<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrierung - Drei Bohnen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h1 class="mb-4">Registrierung</h1>
                <div id="registerMessage"></div>
                <form id="registerForm">
                    <div class="row g-3">
                        <div class="col-md-2">
                            <label for="registerSalutation" class="form-label">Anrede</label>
                            <select class="form-select" id="registerSalutation" name="salutation" required>
                                <option value="Herr">Herr</option>
                                <option value="Frau">Frau</option>
                                <option value="Divers">Divers</option>
                            </select>
                        </div>
                        <div class="col-md-5">
                            <label for="registerFirstName" class="form-label">Vorname</label>
                            <input type="text" class="form-control" id="registerFirstName" name="first_name" required>
                        </div>
                        <div class="col-md-5">
                            <label for="registerLastName" class="form-label">Nachname</label>
                            <input type="text" class="form-control" id="registerLastName" name="last_name" required>
                        </div>
                    </div>

                    <div class="row g-3 mt-3">
                        <div class="col-md-6">
                            <label for="registerStreet" class="form-label">Adresse</label>
                            <input type="text" class="form-control" id="registerStreet" name="street" required>
                        </div>
                        <div class="col-md-2">
                            <label for="registerZip" class="form-label">PLZ</label>
                            <input type="text" class="form-control" id="registerZip" name="zip" required>
                        </div>
                        <div class="col-md-4">
                            <label for="registerCity" class="form-label">Ort</label>
                            <input type="text" class="form-control" id="registerCity" name="city" required>
                        </div>
                    </div>

                    <div class="row g-3 mt-3">
                        <div class="col-md-6">
                            <label for="registerEmail" class="form-label">E-Mail-Adresse</label>
                            <input type="email" class="form-control" id="registerEmail" name="email" required>
                        </div>
                        <div class="col-md-6">
                            <label for="registerUsername" class="form-label">Benutzername</label>
                            <input type="text" class="form-control" id="registerUsername" name="username" required>
                        </div>
                    </div>

                    <div class="row g-3 mt-3">
                        <div class="col-md-6">
                            <label for="registerPassword" class="form-label">Passwort</label>
                            <input type="password" class="form-control" id="registerPassword" name="password" required minlength="8">
                        </div>
                        <div class="col-md-6">
                            <label for="registerPasswordConfirm" class="form-label">Passwort wiederholen</label>
                            <input type="password" class="form-control" id="registerPasswordConfirm" name="password_confirm" required minlength="8">
                        </div>
                    </div>

                    <div class="row g-3 mt-3">
                        <div class="col-md-12">
                            <label for="registerPayment" class="form-label">Zahlungsinformationen</label>
                            <input type="text" class="form-control" id="registerPayment" name="payment_info" placeholder="z.B. Kreditkarte/Paypal" required>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-dark">Registrieren</button>
                        <a class="btn btn-outline-secondary ms-2" href="login.html">Zum Login</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
