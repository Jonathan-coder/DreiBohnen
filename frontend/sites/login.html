<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Drei Bohnen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="mb-4">Login</h1>
                <div id="loginMessage"></div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginIdentifier" class="form-label">Benutzername oder E-Mail</label>
                        <input type="text" class="form-control" id="loginIdentifier" name="identifier" required>
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">Passwort</label>
                        <input type="password" class="form-control" id="loginPassword" name="password" required>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="loginRemember" name="remember">
                        <label class="form-check-label" for="loginRemember">Login merken</label>
                    </div>
                    <button type="submit" class="btn btn-dark">Einloggen</button>
                    <a class="btn btn-outline-secondary ms-2" href="register.html">Registrieren</a>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
