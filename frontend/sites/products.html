<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Produkte - Drei Bohnen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    
    <main class="container my-5">
        <h1 class="mb-4">Unsere Produkte</h1>
        
        <!-- Kategorien Filter -->
        <div class="category-filter mb-4">
            <div class="btn-group" role="group" id="category-buttons">
                <button type="button" class="btn btn-outline-primary category-btn active" data-category="all">
                    Alle Kategorien
                </button>
                <!-- Weitere Kategorien werden per AJAX geladen -->
            </div>
        </div>

        <!-- Produkte Grid -->
        <div class="row" id="product-list">
            <!-- Produkte werden per AJAX geladen -->
        </div>
    </main>
    
    <div id="footer-placeholder"></div>
    
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/main.js"></script>
    
</body>
</html>
